  dev:
    etymology:
      subtitle: "Originea și semnificația termenilor și comenzilor din programare."
      bash_desc: "Un shell Unix și un limbaj de comandă, numit ca un joc de cuvinte pe seama shell-ului Bourne."
      sudo_desc: "Permite unui utilizator autorizat să execute o comandă cu privilegii ridicate."
      bash_legend: "Shell-ul Bourne Shell (sh) a fost creat în anii ’70 de Stephen Bourne la Bell Labs, ca interfață principală pentru sistemul Unix. A devenit rapid standardul pentru scripting datorită simplității și portabilității sale. Totuși, pe măsură ce Unix s-a dezvoltat, au apărut limitări funcționale și fragmentare între diferite shell-uri, unele dintre ele neavând codul sursă liber.\n\nPentru a oferi o alternativă liberă și mai puternică, proiectul GNU Project a dezvoltat în 1989 Bash, creat de Brian Fox. Numele este un joc de cuvinte („Bourne Again”), indicând faptul că este o versiune modernizată a Bourne Shell. Bash păstrează compatibilitatea cu sh, dar adaugă funcționalități avansate precum completarea comenzilor, istoricul comenzilor și scripting mai puternic, devenind astfel shell-ul implicit pe majoritatea sistemelor Linux.\n\nDeci, Bash este Bourne Again Shell. 🙂"

  about:
    description: "Cercetătoare a florei spontane și programator în formare: în ambele domenii păstrez o răbdare perenă. 💚"
